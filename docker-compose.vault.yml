# HashiCorp Vault dev profile for SPE advanced-feature demonstration.
# Use only for local project evaluation; do not use this dev token in production.

services:
  vault:
    image: hashicorp/vault:1.17
    container_name: vault
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: spe-dev-root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    networks:
      - spe-network
    restart: unless-stopped

networks:
  spe-network:
    external: true
    name: spe_mp_spe-network
