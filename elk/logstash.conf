# Logstash Configuration for SPE Platform

input {
  # Read from application logs
  file {
    path => "/var/log/spe-platform/*.log"
    start_position => "beginning"
    sincedb_path => "/tmp/logstash-spe-platform.sincedb"
    codec => json
    tags => ["spe-file-logs"]
  }
  
  # TCP input for direct log forwarding (port 5000)
  tcp {
    port => 5000
    codec => json
    tags => ["spe-api"]
  }
  
  # UDP input for high-volume logs
  udp {
    port => 5000
    codec => json
    tags => ["spe-services"]
  }
}

filter {
  # Add metadata
  mutate {
    add_field => { "environment" => "production" }
    add_field => { "platform" => "spe-platform" }
  }
  
  # Grok patterns for common log formats
  if [tags] contains "spe-api" {
    grok {
      match => { "message" => "%{TIMESTAMP_ISO8601:timestamp} \[%{LOGLEVEL:loglevel}\] %{GREEDYDATA:message}" }
    }
  }
  
  # Date parsing
  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }
  }
  
  # Remove unnecessary fields
  mutate {
    remove_field => [ "host", "path" ]
  }
}

output {
  # Send to Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "spe-platform-%{+YYYY.MM.dd}"
  }
  
  # Also output to stdout for debugging
  stdout {
    codec => rubydebug
  }
}
