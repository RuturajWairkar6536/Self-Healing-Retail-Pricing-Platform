---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: spe-network-policy
  namespace: spe-platform
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: spe-platform
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: spe-platform
  - to:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pricing-api-pdb
  namespace: spe-platform
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: pricing-api

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: customer-portal-pdb
  namespace: spe-platform
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: customer-portal

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pricing-api-hpa
  namespace: spe-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pricing-api
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: customer-portal-hpa
  namespace: spe-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: customer-portal
  minReplicas: 2
  maxReplicas: 4
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 85
