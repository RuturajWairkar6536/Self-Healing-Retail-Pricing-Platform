---
apiVersion: v1
kind: Service
metadata:
  name: pricing-api
  namespace: spe-platform
  labels:
    app: pricing-api
spec:
  type: ClusterIP
  selector:
    app: pricing-api
  ports:
  - port: 5001
    targetPort: 5001
    protocol: TCP
    name: http
  sessionAffinity: None

---
apiVersion: v1
kind: Service
metadata:
  name: admin-dashboard
  namespace: spe-platform
  labels:
    app: admin-dashboard
spec:
  type: ClusterIP
  selector:
    app: admin-dashboard
  ports:
  - port: 8503
    targetPort: 8503
    protocol: TCP
    name: http

---
apiVersion: v1
kind: Service
metadata:
  name: customer-portal
  namespace: spe-platform
  labels:
    app: customer-portal
spec:
  type: ClusterIP
  selector:
    app: customer-portal
  ports:
  - port: 8504
    targetPort: 8504
    protocol: TCP
    name: http

---
# External service to expose Pricing API
apiVersion: v1
kind: Service
metadata:
  name: pricing-api-external
  namespace: spe-platform
  labels:
    app: pricing-api
spec:
  type: LoadBalancer
  selector:
    app: pricing-api
  ports:
  - port: 5001
    targetPort: 5001
    protocol: TCP
    name: http

---
# External service to expose Admin Dashboard
apiVersion: v1
kind: Service
metadata:
  name: admin-dashboard-external
  namespace: spe-platform
  labels:
    app: admin-dashboard
spec:
  type: LoadBalancer
  selector:
    app: admin-dashboard
  ports:
  - port: 8503
    targetPort: 8503
    protocol: TCP
    name: http

---
# External service to expose Customer Portal
apiVersion: v1
kind: Service
metadata:
  name: customer-portal-external
  namespace: spe-platform
  labels:
    app: customer-portal
spec:
  type: LoadBalancer
  selector:
    app: customer-portal
  ports:
  - port: 8504
    targetPort: 8504
    protocol: TCP
    name: http
