---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pricing-api-config
  namespace: spe-platform
data:
  FLASK_ENV: production
  PYTHONUNBUFFERED: "1"
  LOG_LEVEL: INFO
  API_PORT: "5001"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: streamlit-config
  namespace: spe-platform
data:
  config.toml: |
    [client]
    showErrorDetails = false
    toolbarMode = "minimal"
    
    [logger]
    level = "info"
    
    [server]
    runOnSave = true
    headless = true
    enableXsrfProtection = true
    enableCORS = false

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ml-trainer-config
  namespace: spe-platform
data:
  PYTHONUNBUFFERED: "1"
  LOG_LEVEL: INFO
