---
apiVersion: v1
kind: Secret
metadata:
  name: pricing-api-secrets
  namespace: spe-platform
type: Opaque
stringData:
  DATABASE_URL: "postgresql://spe_user:spe_secure_password_change_me@postgres:5432/spe_platform"
  REDIS_URL: "redis://redis:6379/0"
  SECRET_KEY: "your-secret-key-change-in-production"

---
apiVersion: v1
kind: Secret
metadata:
  name: docker-registry-secret
  namespace: spe-platform
type: kubernetes.io/dockercfg
stringData:
  .dockercfg: |
    {
      "docker.io": {
        "auth": "BASE64_ENCODED_DOCKER_HUB_CREDENTIALS"
      }
    }
