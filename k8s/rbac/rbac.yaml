---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pricing-api-sa
  namespace: spe-platform

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: admin-dashboard-sa
  namespace: spe-platform

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: customer-portal-sa
  namespace: spe-platform

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ml-trainer-sa
  namespace: spe-platform

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spe-read-role
  namespace: spe-platform
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pricing-api-role-binding
  namespace: spe-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: spe-read-role
subjects:
- kind: ServiceAccount
  name: pricing-api-sa
  namespace: spe-platform

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: admin-dashboard-role-binding
  namespace: spe-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: spe-read-role
subjects:
- kind: ServiceAccount
  name: admin-dashboard-sa
  namespace: spe-platform

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: customer-portal-role-binding
  namespace: spe-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: spe-read-role
subjects:
- kind: ServiceAccount
  name: customer-portal-sa
  namespace: spe-platform

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ml-trainer-role-binding
  namespace: spe-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: spe-read-role
subjects:
- kind: ServiceAccount
  name: ml-trainer-sa
  namespace: spe-platform
